name: CI — Raíces Market

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test-backend:
    name: Pruebas Backend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Instalar dependencias
        run: pnpm install

      - name: Ejecutar pruebas unitarias e integración con cobertura
        env:
          JWT_SECRET: test-jwt-secret-ci
          NODE_ENV: test
        run: pnpm test

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 30
